    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
  fonts:
    - family: MyIconsName
      fonts:
        - asset: assets/fonts/MyIconsName.ttf
    - family: MyAnimatedicon
      fonts:
        - asset: assets/fonts/MyAnimatedicon.ttf